<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>수정</title>
  </head>
  <body>
    <h1>수정</h1>
    <form action="/save/" method="post"
      <input type="hidden" name="name" value="<%= Name %>" />
      <label for="title">제목:</label><br />
      <input
        type="text"
        id="title"
        name="title"
        value="<%= Title %>"
        size="50"
      /><br />
      <label for="content">내용:</label><br />
      <textarea id="content" name="content" rows="10" cols="50">
      </textarea
      ><br />
      <input type="submit" value="Save" />
    </form>  
    <a href="/">돌아가기</a>
  </body>
</html>
